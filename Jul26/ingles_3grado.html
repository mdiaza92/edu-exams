<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Bimestral Exam - Edward</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #f0f7fc; padding: 15px; color: #2c3e50; }
        .container { max-width: 950px; background: white; margin: auto; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid #3498db; }
        h1 { text-align: center; color: #2980b9; text-transform: uppercase; font-size: 1.8em; margin-bottom: 5px; }
        h2 { text-align: center; color: #7f8c8d; font-size: 1.1em; margin-bottom: 25px; }
        
        .section-header { 
            position: -webkit-sticky; position: sticky; top: 0; 
            background: #3498db; color: #fff; padding: 15px; 
            border-radius: 12px; margin: 30px 0 15px 0; 
            text-align: center; font-weight: bold; z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        /* DISEÑO DE DOS COLUMNAS COMPATIBLE CON TABLETS */
        .main-layout { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 25px; }
        .questions-column { flex: 1; }
        
        /* TARJETA VISUAL DE REFERENCIA A LA DERECHA */
        .visual-side-card { 
            width: 220px; background: #e8f4f8; border: 3px dashed #3498db; 
            border-radius: 18px; padding: 20px; text-align: center; 
            position: sticky; top: 70px; box-sizing: border-box;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .visual-emoji { font-size: 4.5em; margin-bottom: 10px; display: block; animation: float 3s ease-in-out infinite; }
        .visual-tag { background: #3498db; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; font-weight: bold; display: inline-block; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .section { margin-bottom: 15px; padding: 18px; border: 2px solid #e2e8f0; border-radius: 15px; background-color: #ffffff; transition: 0.3s; }
        .incomplete { border: 3px solid #e74c3c !important; background-color: #fff5f5 !important; }
        .question-title { font-weight: bold; margin-bottom: 12px; color: #2f3542; display: block; line-height: 1.4; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ced4da; font-size: 16px; font-family: inherit; box-sizing: border-box; }
        .options label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 8px; border: 1px solid #eee; transition: 0.2s; }
        .options label:hover { background: #ebf5fb; border-color: #3498db; }
        
        button#btn-evaluar { display: block; width: 100%; max-width: 350px; height: 65px; margin: 40px auto; background: #27ae60; color: white; border: none; border-radius: 35px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #1e8449; }
        
        #result-box { display: none; padding: 25px; border-radius: 20px; margin-top: 30px; border: 4px solid; }
        .correct-box { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error-box { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        
        .revision-container { margin-top: 20px; background: white; border-radius: 10px; padding: 15px; border: 1px solid #ccc; }
        .item-revision { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ddd; text-align: left; }
        .resp-correcta { color: #27ae60; font-weight: bold; }
        .resp-usuario { font-style: italic; color: #555; }
        .explicacion { color: #2980b9; font-size: 0.9em; font-style: italic; margin-top: 5px; }
        .missing-alert { color: #e74c3c; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; padding: 10px; background: #fdf2f2; border-radius: 10px; border: 2px solid #e74c3c; }

        /* Adaptación para pantallas pequeñas */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column-reverse; }
            .visual-side-card { width: 100%; position: relative; top: 0; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇬🇧 English Bimestral Exam</h1>
    <h2>Edward, read carefully and show your skills!</h2>

    <div id="missing-msg" class="missing-alert">⚠️ Edward, you missed some questions! Check the red boxes.</div>

    <form id="quizForm">
        <div id="quizContainer"></div>
        <button type="button" id="btn-evaluar" onclick="validarExamen()">✨ Finish Exam</button>
    </form>

    <div id="result-box">
        <h3 id="score-text"></h3>
        <div id="feedback-content"></div>
        <div id="revision-lista" class="revision-container">
            <h4>🔍 Review (Correction List):</h4>
            <div id="lista-items"></div>
        </div>
    </div>
</div>

<script>
    // ESTRUCTURA JSON CON DATOS DE PREGUNTAS Y CONFIGURACIÓN VISUAL ADICIONAL
    const examData = {
      "sections": [
        {
          "title": "Week 1: Wild Animals & Has got",
          "emoji": "🐆",
          "tag": "Wild Wildlife",
          "questions": [
            {"id": "q1", "type": "write", "question": "Complete the name of this animal: A wild cat with black spots is a l _ _ _ _ r d.", "correct": "leopard", "feedback": "A cat with spots is a leopard."},
            {"id": "q2", "type": "write", "question": "Complete the feature: A snake hasn't got legs, it has got s _ _ _ _ s.", "correct": "scales", "feedback": "Reptiles like snakes have scales."},
            {"id": "q3", "type": "choice", "question": "Which animal has got a mask around its eyes and a striped tail?", "options": ["Raccoon", "Peacock", "Crocodile"], "correct": "Raccoon", "feedback": "The raccoon has got a mask and a striped tail."},
            {"id": "q4", "type": "choice", "question": "A peacock has got beautiful and colourful ____________.", "options": ["feathers", "fur", "scales"], "correct": "feathers", "feedback": "Birds have feathers."},
            {"id": "q5", "type": "choice", "question": "Complete the song sentence: 'It's got teeth and a scary __________.'", "options": ["smile", "hair", "tail"], "correct": "smile", "feedback": "The crocodile has got a scary smile."},
            {"id": "q6", "type": "choice", "question": "Choose the correct grammar option: A snake ____________ got fur.", "options": ["hasn't", "has", "have"], "correct": "hasn't", "feedback": "Snakes do not have fur (hasn't got)."},
            {"id": "q7", "type": "choice", "question": "Choose the correct option: Leopards ____________ got fur and spots.", "options": ["have", "has", "hasn't"], "correct": "have", "feedback": "Leopards (plural) have got fur."},
            {"id": "q8", "type": "reorder", "question": "Reorder words to make a correct sentence: [fur] [A] [got] [leopard] [has]", "correct": "A leopard has got fur", "feedback": "Structure: Subject + has got + object."},
            {"id": "q9", "type": "reorder", "question": "Reorder words to make a correct sentence: [legs] [snake] [hasn't] [A] [got]", "correct": "A snake hasn't got legs", "feedback": "Structure: Subject + hasn't got + object."},
            {"id": "q10", "type": "write", "question": "Complete the word: A crocodile has got a long t _ _ l.", "correct": "tail", "feedback": "The crocodile has a long tail."}
          ]
        },
        {
          "title": "Week 2: Story & Mammals vs Reptiles",
          "emoji": "🐢",
          "tag": "Animal Science",
          "questions": [
            {"id": "q11", "type": "choice", "question": "In the story 'Chameleon's tail', what game do the wild animals play?", "options": ["hide-and-seek", "football", "tennis"], "correct": "hide-and-seek", "feedback": "They play hide-and-seek."},
            {"id": "q12", "type": "write", "question": "In the story, Raccoon hides behind a r _ _ k.", "correct": "rock", "feedback": "Raccoon hides behind a rock."},
            {"id": "q13", "type": "write", "question": "Peacock hides behind a t _ _ e.", "correct": "tree", "feedback": "Peacock hides behind a tree."},
            {"id": "q14", "type": "choice", "question": "What is Chameleon's special ability to hide?", "options": ["Change colour", "Run very fast", "Fly high"], "correct": "Change colour", "feedback": "Chameleon changes colour (camouflage)."},
            {"id": "q15", "type": "choice", "question": "Most mammals have got hair or ____________.", "options": ["fur", "scales", "shells"], "correct": "fur", "feedback": "Mammals have hair or fur."},
            {"id": "q16", "type": "choice", "question": "What temperature of blood do mammals have?", "options": ["warm blood", "cold blood", "no blood"], "correct": "warm blood", "feedback": "Mammals have warm blood."},
            {"id": "q17", "type": "choice", "question": "What do baby mammals drink from their mother?", "options": ["milk", "water", "juice"], "correct": "milk", "feedback": "Baby mammals drink milk."},
            {"id": "q18", "type": "choice", "question": "A turtle is a reptile. It has got a hard ____________ on its back.", "options": ["shell", "feather", "fur"], "correct": "shell", "feedback": "Turtles have a protective shell."},
            {"id": "q19", "type": "reorder", "question": "Reorder the text: [eggs] [Most] [lay] [reptiles]", "correct": "Most reptiles lay eggs", "feedback": "Reptiles lay eggs to reproduce."},
            {"id": "q20", "type": "reorder", "question": "Reorder the text: [milk] [Mammals] [produce] [babies] [for]", "correct": "Mammals produce milk for babies", "feedback": "Mammals feed their babies with milk."}
          ]
        },
        {
          "title": "Week 3: Questions with 'Has it got...?'",
          "emoji": "🦔",
          "tag": "Grammar & Vet",
          "questions": [
            {"id": "q21", "type": "choice", "question": "Complete the question: '______ it got scales?'", "options": ["Has", "Have", "Is"], "correct": "Has", "feedback": "We use 'Has' for third-person singular (it)."},
            {"id": "q22", "type": "choice", "question": "Answer the question (Negative): 'Has a crocodile got feathers?'", "options": ["No, it hasn't.", "Yes, it has.", "No, it haven't."], "correct": "No, it hasn't.", "feedback": "Crocodiles do not have feathers."},
            {"id": "q23", "type": "choice", "question": "Answer the question (Positive): 'Has a peacock got feathers?'", "options": ["Yes, it has.", "No, it hasn't.", "Yes, it have."], "correct": "Yes, it has.", "feedback": "Peacocks have colorful feathers."},
            {"id": "q24", "type": "write", "question": "Complete the short answer: 'Has your animal got fur?' 'No, it h _ _ _ _ ' t.'", "correct": "hasn't", "feedback": "Negative short answer is 'No, it hasn't.'"},
            {"id": "q25", "type": "write", "question": "Complete the positive short answer: 'Has it got a shell?' 'Yes, it h _ _.'", "correct": "has", "feedback": "Positive short answer is 'Yes, it has.'"},
            {"id": "q26", "type": "reorder", "question": "Unscramble the question: [it] [Has] [feathers] [got] [?]", "correct": "Has it got feathers?", "feedback": "Question structure: Has + subject + got + object + ?"},
            {"id": "q27", "type": "reorder", "question": "Unscramble the question: [a] [leopard] [Has] [got] [spots] [?]", "correct": "Has a leopard got spots?", "feedback": "Question structure for specific animal."},
            {"id": "q28", "type": "choice", "question": "In the dialogue, Victor is a vet. What is in the box that has got feathers and is very colourful?", "options": ["A parrot", "A snake", "An otter"], "correct": "A parrot", "feedback": "The colorful bird in Victor's box is a parrot."},
            {"id": "q29", "type": "choice", "question": "Which animal lives in Harry's garden and has got lots of spines?", "options": ["A hedgehog", "A fox", "An owl"], "correct": "A hedgehog", "feedback": "Hedgehogs have spines to protect themselves."},
            {"id": "q30", "type": "write", "question": "The hedgehog eats insects and s _ _ _ _ s.", "correct": "snails", "feedback": "Hedgehogs eat snails in the garden."}
          ]
        },
        {
          "title": "Week 4: Reading Review & Culture",
          "emoji": "🐨",
          "tag": "World Habitats",
          "questions": [
            {"id": "q31", "type": "choice", "question": "Where does the koala live according to the reading?", "options": ["Australia", "UK", "Peru"], "correct": "Australia", "feedback": "Koalas live in Australia."},
            {"id": "q32", "type": "write", "question": "The koala sleeps in trees for 18 h _ _ _ s a day.", "correct": "hours", "feedback": "Koalas sleep for 18 hours."},
            {"id": "q33", "type": "choice", "question": "What does a koala eat?", "options": ["leaves", "insects", "fish"], "correct": "leaves", "feedback": "Koalas eat leaves from trees."},
            {"id": "q34", "type": "write", "question": "Harry says foxes and o _ _ s are common cool birds in the UK.", "correct": "owls", "feedback": "Owls are common nocturnal birds in the UK."},
            {"id": "q35", "type": "choice", "question": "This bird is called a robin. It has got red and ____________ feathers.", "options": ["brown", "blue", "yellow"], "correct": "brown", "feedback": "Robins have red and brown feathers."},
            {"id": "q36", "type": "choice", "question": "The bird with yellow and blue feathers next to the tree is a:", "options": ["blue tit", "robin", "parrot"], "correct": "blue tit", "feedback": "It's called a blue tit."},
            {"id": "q37", "type": "reorder", "question": "Reorder the expression: [over] [Look] [bird] [at] [that] [there]", "correct": "Look at that bird over there", "feedback": "Useful expression to show something distant."},
            {"id": "q38", "type": "choice", "question": "What type of animal is a fox?", "options": ["It is a mammal.", "It is a reptile.", "It is a bird."], "correct": "It is a mammal.", "feedback": "Foxes have fur and produce milk."},
            {"id": "q39", "type": "write", "question": "What color is the fox's fur in the Week 2 sheet? r _ _ - b _ _ _ n.", "correct": "red-brown", "feedback": "The fox has red-brown fur."},
            {"id": "q40", "type": "choice", "question": "Spelling review: Choose the correct spelling for 'sangre':", "options": ["blood", "blod", "bloods"], "correct": "blood", "feedback": "The correct spelling is b-l-o-o-d."}
          ]
        }
      ]
    };

    // GENERADOR DINÁMICO CON MAQUETACIÓN DE DOBLE COLUMNA
    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        let questionCounter = 1;
        
        examData.sections.forEach(section => {
            // Título flotante (sticky)
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = section.title;
            container.appendChild(header);
            
            // Contenedor principal de dos columnas
            const layoutDiv = document.createElement('div');
            layoutDiv.className = 'main-layout';
            
            // Columna Izquierda: Bloque de preguntas
            const questionsColumn = document.createElement('div');
            questionsColumn.className = 'questions-column';
            
            section.questions.forEach(q => {
                const secDiv = document.createElement('div');
                secDiv.className = 'section';
                secDiv.id = 'sec_' + q.id;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'question-title';
                titleSpan.innerText = `${questionCounter}. ${q.question}`;
                secDiv.appendChild(titleSpan);
                
                if (q.type === 'choice') {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'options';
                    q.options.forEach(opt => {
                        const lbl = document.createElement('label');
                        lbl.innerHTML = `<input type="radio" name="${q.id}" value="${opt}" onclick="clearRed('sec_${q.id}')"> ${opt}`;
                        optDiv.appendChild(lbl);
                    });
                    secDiv.appendChild(optDiv);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = q.id;
                    input.placeholder = q.type === 'reorder' ? 'Write the sentence here...' : 'Type missing letters/words...';
                    input.oninput = function() { clearRed('sec_' + q.id); };
                    secDiv.appendChild(input);
                }
                
                questionsColumn.appendChild(secDiv);
                questionCounter++;
            });
            
            // Columna Derecha: Tarjeta visual alusiva integrada
            const visualCard = document.createElement('div');
            visualCard.className = 'visual-side-card';
            visualCard.innerHTML = `
                <span class="visual-emoji">${section.emoji}</span>
                <span class="visual-tag">${section.tag}</span>
                <p style="font-size: 0.85em; color: #555; margin-top: 10px; line-height: 1.3;">
                    Edward, think about these animals to solve this section!
                </p>
            `;
            
            // Unir columnas al layout y el layout al documento
            layoutDiv.appendChild(questionsColumn);
            layoutDiv.appendChild(visualCard);
            container.appendChild(layoutDiv);
        });
    }

    function clearRed(id) { 
        document.getElementById(id).classList.remove('incomplete'); 
        if(document.querySelectorAll('.incomplete').length === 0) document.getElementById('missing-msg').style.display='none';
    }

    function validarExamen() {
        let vacios = [];
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let respondido = false;
                if (q.type === 'choice') {
                    if (document.querySelector(`input[name="${q.id}"]:checked`)) respondido = true;
                } else {
                    if (document.getElementById(q.id).value.trim() !== "") respondido = true;
                }
                
                if (!respondido) {
                    const container = document.getElementById('sec_' + q.id);
                    container.classList.add('incomplete');
                    vacios.push(container);
                }
            });
        });

        if (vacios.length > 0) {
            document.getElementById('missing-msg').style.display = 'block';
            vacios[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        calificarExamen();
    }

    function calificarExamen() {
        let nota = 0;
        let totalPreguntas = 40;
        let itemsHTML = "";
        let questionIndex = 1;

        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let uVal = "";
                if (q.type === 'choice') {
                    uVal = document.querySelector(`input[name="${q.id}"]:checked`).value;
                } else {
                    uVal = document.getElementById(q.id).value.trim();
                }

                let cleanU = uVal.toLowerCase().replace(/[.?!,']/g, "").replace(/\s+/g, ' ');
                let cleanC = q.correct.toLowerCase().replace(/[.?!,']/g, "").replace(/\s+/g, ' ');
                
                let esOk = cleanU === cleanC;
                if (esOk) nota++;

                itemsHTML += `<div class="item-revision">
                    <p><strong>Question ${questionIndex}: ${q.question}</strong></p>
                    <p>Your answer: <span class="resp-usuario">${uVal}</span> ${esOk ? '✅' : '❌'}</p>
                    ${!esOk ? `<p class="resp-correcta">Correct Answer: ${q.correct}</p>` : ''}
                    <p class="explicacion">💡 Explanation: ${q.feedback}</p>
                </div>`;
                    
                questionIndex++;
            });
        });

        const finalScore = Math.round((nota / totalPreguntas) * 20);
        const rb = document.getElementById('result-box');
        
        rb.style.display = 'block';
        document.getElementById('score-text').innerText = `Final Score: ${finalScore} / 20 (${nota} correct answers)`;
        document.getElementById('lista-items').innerHTML = itemsHTML;
        
        if(finalScore >= 11) {
            rb.className = "correct-box";
            document.getElementById('feedback-content').innerHTML = "<h4>🌟 Great job, Edward! You passed the bimestral exam!</h4>";
        } else {
            rb.className = "error-box";
            document.getElementById('feedback-content').innerHTML = "<h4>📚 Good effort, Edward! Let's check the answers below to review your worksheets.</h4>";
        }
        
        window.scrollTo({ top: rb.offsetTop, behavior: 'smooth' });
    }

    window.onload = renderQuiz;
</script>
</body>
</html>
