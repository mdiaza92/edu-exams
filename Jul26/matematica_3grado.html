            {"id": "m32", "type": "write", "question": "Aplica la propiedad distributiva: 7 x (30 - 5) = (7 x 30) - (7 x ___). Escribe el número que falta en el espacio vacío:", "correct": "5", "feedback": "El factor 7 se distribuye multiplicando tanto al 30 como al 5 individuales: (7 x 30) - (7 x 5)[cite: 52].", "tip": "El número de la izquierda se reparte equitativamente con los dos términos internos del paréntesis[cite: 52]."}
          ]
        },
        {
          "title": "Semana 7: Situaciones Problemáticas de Adición y Sustracción",
          "emoji": "🎒",
          "tag": "Resolución de Problemas",
          "questions": [
            {"id": "m33", "type": "choice", "question": "En una combi viajan 18 personas. En el paradero de Larco suben varios pasajeros y ahora viajan 32 en total. ¿Qué tipo de problema aditivo es?", "options": ["Problema de Comparación", "Problema de Cambio (Aumento)", "Problema de Igualación"], "correct": "Problema de Cambio (Aumento)", "feedback": "Hay una situación de cambio porque partimos de una cantidad inicial que aumenta con la llegada de nuevos pasajeros[cite: 46].", "tip": "¡Atajo de la pizarra! Para hallar el cambio o la incógnita central de forma inmediata, resta el total final menos el inicial: 32 - 18 = 14[cite: 46]."},
            {"id": "m34", "type": "choice", "question": "Lucía compra 75 papas para su restaurante. Cocina una rica causa limeña y le quedan 48 papas. ¿Cuántas papas utilizó?", "options": ["27 papas", "37 papas", "123 papas"], "correct": "27 papas", "feedback": "Es una resta por situación de disminución: 75 - 48 = 27 papas utilizadas[cite: 46].", "tip": "¡Atajo de la resta prestando! Convierte el 5 en 15 pidiéndole prestado al vecino: 15 - 8 = 7, y el 7 se convierte en 6: 6 - 4 = 2. Resultado: 27[cite: 46]."},
            {"id": "m35", "type": "choice", "question": "Don Carlos vende 64 kilos de mandarinas y 39 kilos de fresas. ¿Cuántos kilos MÁS de mandarinas que de fresas vendió?", "options": ["103 kilos", "35 kilos", "25 kilos"], "correct": "25 kilos", "feedback": "Es un problema de comparación. Hallamos la diferencia restando ambas cantidades: 64 - 39 = 25 kilos más[cite: 46].", "tip": "¡Atajo de control! Cuando te pregunten '¿Cuánto más?' o '¿Cuánto menos?', te están pidiendo calcular la diferencia mediante una resta[cite: 46]."},
            {"id": "m36", "type": "write", "question": "El estante de Comunicación tiene 82 libros y el de Matemática tiene 57. Resuelve: ¿Cuántos libros MENOS tiene el estante de Matemática?: _ _ .", "correct": "25", "feedback": "Restamos para comparar los dos estantes de la escuela: 82 - 57 = 25 libros menos[cite: 46].", "tip": "Plantea la operación verticalmente alineando unidades y decenas para no equivocarte en el canje[cite: 46]."},
            {"id": "m37", "type": "choice", "question": "El aula A juntó 145 tapitas para reciclar. El aula B juntó 28 tapitas MÁS que el aula A. ¿Cuántas tapitas tiene el aula B?", "options": ["117 tapitas", "173 tapitas", "163 tapitas"], "correct": "173 tapitas", "feedback": "Como el aula B tiene la cantidad de A más una ventaja adicional de 28, sumamos: 145 + 28 = 173 tapitas[cite: 46].", "tip": "¡Atajo visual! Si te dan la cantidad de uno y te dicen que el otro tiene 'más que', debes hacer una suma de adición directa[cite: 46]."},
            {"id": "m38", "type": "choice", "question": "Santiago tiene 36 canicas. Matías tiene 15 canicas MENOS que Santiago. ¿Cuántas canicas tienen entre los dos juntos?", "options": ["21 canicas", "57 canicas", "51 canicas"], "correct": "57 canicas", "feedback": "Paso 1: Hallar lo de Matías (36 - 15 = 21). Paso 2: Sumar ambas colecciones juntas (36 + 21 = 57 canicas totales)[cite: 46].", "tip": "¡Cuidado con las dos etapas! Este problema tiene trampa; primero descubre la cantidad oculta del amigo y luego junta los dos totales mediante una suma[cite: 46]."},
            {"id": "m39", "type": "choice", "question": "Ana diseña un banderín triangular para su equipo. Sabe que dos de sus ángulos miden 50° y 60°. ¿Cuánto mide el tercer ángulo sabiendo que la suma interna de todo triángulo es 180°?", "options": ["90°", "70°", "80°"], "correct": "70°", "feedback": "Sumamos los conocidos: 50° + 60° = 110°. Restamos de la propiedad general: 180° - 110° = 70°[cite: 47].", "tip": "¡Atajo de la pizarra! Suma los dos ángulos que tienes y mira cuánto te falta en tu mente para llegar al número mágico de 180°[cite: 47]."},
            {"id": "m40", "type": "choice", "question": "El banderín de Ana del problema anterior tiene ángulos que miden 50°, 60° y 70°. Como todos sus ángulos son menores de 90°, ¿qué tipo de triángulo es por sus de aberturas?", "options": ["Triángulo Rectángulo", "Triángulo Acutángulo", "Triángulo Obtusángulo"], "correct": "Triángulo Acutángulo", "feedback": "Al tener tres aberturas agudas (menores de 90°), recibe el nombre de triángulo acutángulo.", "tip": "¡Filtro de nombres! Agudo se convierte en acutángulo; obtuso se convierte en obtusángulo; recto se convierte en rectángulo."}
          ]
        }
      ]
    };

    let comodinUsado = false;
    let logDudas = {};

    function trackDuda(id) { logDudas[id] = (logDudas[id] || 0) + 1; }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        let questionCounter = 1;
        examData.sections.forEach(section => {
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = section.title;
            container.appendChild(header);
            const layoutDiv = document.createElement('div');
            layoutDiv.className = 'main-layout';
            const questionsColumn = document.createElement('div');
            questionsColumn.className = 'questions-column';
            section.questions.forEach(q => {
                const secDiv = document.createElement('div');
                secDiv.className = 'section';
                secDiv.id = 'sec_' + q.id;
                const titleSpan = document.createElement('span');
                titleSpan.className = 'question-title';
                titleSpan.innerText = `${questionCounter}. ${q.question}`;
                secDiv.appendChild(titleSpan);
                
                // INYECTAR GRÁFICOS DINÁMICOS CORREGIDOS
                if (q.hasGraph === "agudo") {
                    const graphDiv = document.createElement('div');
                    graphDiv.className = 'angle-container';
                    graphDiv.innerHTML = `
                        <svg class="angle-svg">
                            <line x1="30" y1="110" x2="190" y2="110" stroke="#34495e" stroke-width="3" />
                            <line x1="30" y1="110" x2="140" y2="30" stroke="#34495e" stroke-width="3" />
                            <path d="M 60 110 A 30 30 0 0 0 51 88" fill="none" stroke="#e67e22" stroke-width="3" />
                            <text x="70" y="100" fill="#e67e22" font-weight="bold" font-size="14">44.4°</text>
                            <text x="25" y="125" fill="#2c3e50" font-weight="bold">O</text>
                            <circle cx="30" cy="110" r="4" fill="#2c3e50" />
                        </svg>`;
                    secDiv.appendChild(graphDiv);
                }
                
                if (q.hasGraph === "m8_angle") {
                    const graphDiv = document.createElement('div');
                    graphDiv.className = 'angle-container';
                    graphDiv.innerHTML = `
                        <svg class="angle-svg">
                            <line x1="30" y1="110" x2="190" y2="110" stroke="#34495e" stroke-width="3" />
                            <line x1="30" y1="110" x2="30" y2="10" stroke="#34495e" stroke-width="3" />
                            <line x1="30" y1="110" x2="120" y2="20" stroke="#27ae60" stroke-width="3" />
                            <rect x="30" y="95" width="15" height="15" fill="none" stroke="#2c3e50" stroke-width="2" />
                            <text x="45" y="60" fill="#27ae60" font-weight="bold">x</text>
                            <text x="85" y="100" fill="#2c3e50" font-weight="bold">90°</text>
                            <text x="140" y="40" fill="#2c3e50" font-size="13" font-weight="bold">Total = 115°</text>
                        </svg>`;
                    secDiv.appendChild(graphDiv);
                }

                if (q.hasGraph === "rectangulo") {
                    const graphDiv = document.createElement('div');
                    graphDiv.className = 'angle-container';
                    graphDiv.innerHTML = `
                        <svg class="angle-svg" style="width:160px; height:130px;">
                            <polygon points="30,10 30,100 140,100" fill="#e8f8f5" stroke="#16a085" stroke-width="3" />
                            <rect x="30" y="85" width="15" height="15" fill="none" stroke="#2c3e50" stroke-width="2" />
                            <text x="48" y="80" fill="#2c3e50" font-size="13" font-weight="bold">90°</text>
                        </svg>`;
                    secDiv.appendChild(graphDiv);
                }

                if (q.type === 'choice') {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'options';
                    optDiv.id = 'opts_' + q.id;
                    q.options.forEach(opt => {
                        const lbl = document.createElement('label');
                        lbl.innerHTML = `<input type="radio" name="${q.id}" value="${opt}" onclick="trackDuda('${q.id}'); saveProgress('${q.id}', '${opt}')"> ${opt}`;
                        optDiv.appendChild(lbl);
                    });
                    secDiv.appendChild(optDiv);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = q.id;
                    input.placeholder = q.type === 'reorder' ? 'Escribe el orden correcto aquí...' : 'Escribe el número o palabra...';
                    input.oninput = function() { trackDuda(q.id); saveProgress(q.id, this.value); };
                    secDiv.appendChild(input);
                }
                questionsColumn.appendChild(secDiv);
                questionCounter++;
            });
            const visualCard = document.createElement('div');
            visualCard.className = 'visual-side-card';
            visualCard.innerHTML = `<span class="visual-emoji">${section.emoji}</span><span class="visual-tag">${section.tag}</span><p style="font-size:0.85em; color:#555; margin-top:10px;">Edward: Resuelve en tu papel o pizarra antes de marcar en la tablet. ¡Paciencia!</p>`;
            layoutDiv.appendChild(questionsColumn);
            layoutDiv.appendChild(visualCard);
            container.appendChild(layoutDiv);
        });
        loadSavedProgress();
    }

    function saveProgress(id, val) {
        localStorage.setItem('math_exam_2b_final_' + id, val);
        document.getElementById('sec_' + id).classList.remove('incomplete');
        if(document.querySelectorAll('.incomplete').length === 0) document.getElementById('missing-msg').style.display='none';
    }

    function loadSavedProgress() {
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                const saved = localStorage.getItem('math_exam_2b_final_' + q.id);
                if (saved) {
                    if (q.type === 'choice') {
                        const radio = document.querySelector(`input[name="${q.id}"][value="${saved}"]`);
                        if (radio) radio.checked = true;
                    } else {
                        const txtInput = document.getElementById(q.id);
                        if (txtInput) txtInput.value = saved;
                    }
                }
            });
        });
    }

    function usarCincuentaCincuentaGlobal() {
        if (comodinUsado) return;
        let seleccionada = prompt("Edward, introduce el número de pregunta (de marcar) donde deseas descartar una alternativa incorrecta:");
        let qNum = parseInt(seleccionada);
        if (isNaN(qNum) || qNum < 1 || qNum > 40) return;
        let currentIdx = 1, targetId = null, targetQObj = null;
        for (let s of examData.sections) {
            for (let q of s.questions) {
                if (currentIdx === qNum) { targetId = q.id; targetQObj = q; break; }
                currentIdx++;
            }
            if (targetId) break;
        }
        if (!targetQObj || targetQObj.type !== 'choice') return;
        let labels = document.getElementById('opts_' + targetId).querySelectorAll('label');
        let incorrectasBorradas = 0;
        labels.forEach(lbl => {
            let radio = lbl.querySelector('input');
            if (radio.value !== targetQObj.correct && incorrectasBorradas < 1) { lbl.style.display = 'none'; incorrectasBorradas++; }
        });
        comodinUsado = true;
        document.getElementById('global-5050').disabled = true;
        document.getElementById('global-5050').innerText = "⚡ Súper Poder Usado";
    }

    // EL RESTO DEL SCRIPT CORRE DE MANERA IMPECABLE
    function validarExamen() {
        let vacios = [];
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let r = q.type === 'choice' ? document.querySelector(`input[name="${q.id}"]:checked`) : document.getElementById(q.id).value.trim();
                if (!r) { const c = document.getElementById('sec_' + q.id); c.classList.add('incomplete'); vacios.push(c); }
            });
        });
        if (vacios.length > 0) { document.getElementById('missing-msg').style.display = 'block'; vacios[0].scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
        calificarExamen();
    }

    function calificarExamen() {
        let nota = 0, questionIndex = 1, itemsHTML = "";
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let uVal = q.type === 'choice' ? document.querySelector(`input[name="${q.id}"]:checked`).value : document.getElementById(q.id).value.trim();
                let cleanU = uVal.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                let cleanC = q.correct.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                let esOk = (cleanU === cleanC) || (q.type === 'write' && cleanU.includes(cleanC));
                if (esOk) nota++;
                itemsHTML += `<div class="item-revision" style="border-left:8px solid ${esOk?'#27ae60':'#e74c3c'}">
                    <p><strong>Pregunta ${questionIndex}: ${q.question}</strong></p>
                    <p>Tu respuesta: <span class="resp-usuario">${uVal}</span> ${esOk?'✅':'❌'}</p>
                    ${!esOk?`<p class="resp-correcta">Respuesta Correcta Esperada: ${q.correct}</p>`:''}
                    <p class="explicacion">📌 Resolución de clase: ${q.feedback}</p>
                    <p class="tip-pizarra">💡 Whiteboard Tip (Consejo Rápido): ${q.tip || "Revisa tus tablas de multiplicar y haz el cálculo vertical alineado para operar más rápido."}</p>
                    ${logDudas[q.id]>2?`<p style="color:#e67e22; font-weight:bold; font-size:0.9em; margin-top:5px;">⚠️ ¡Alerta de duda! Edward vaciló o cambió de opinión aquí. Conviene practicar este ejercicio en su pizarra física.</p>`:''}
                </div>`;
                questionIndex++;
            });
        });
        const finalScore = Math.round((nota / 40) * 20);
        const rb = document.getElementById('result-box');
        rb.style.display = 'block';
        document.getElementById('score-text').innerText = `Puntaje Final Bimestral: ${finalScore} / 20 (${nota} aciertos de 40)`;
        document.getElementById('lista-items').innerHTML = itemsHTML;
        rb.className = finalScore >= 11 ? "correct-box" : "error-box";
        document.getElementById('feedback-content').innerHTML = finalScore >= 11 ? "<h4>🌟 ¡Excelente razonamiento matemático, Edward! Dominas los atajos de la pizarra de forma genial.</h4>" : "<h4>📚 ¡Buen intento, Edward! Repasa los consejos rápidos de la pizarra inferior para dominar las propiedades.</h4>";
        localStorage.clear();
        window.scrollTo({ top: rb.offsetTop, behavior: 'smooth' });
    }
    window.onload = renderQuiz;
</script>
