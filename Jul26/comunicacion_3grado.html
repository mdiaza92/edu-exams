    let comodinUsado = false;
    let logDudas = {};

    function trackDuda(id) { logDudas[id] = (logDudas[id] || 0) + 1; }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        let questionCounter = 1;
        examData.sections.forEach(section => {
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = section.title;
            container.appendChild(header);
            const layoutDiv = document.createElement('div');
            layoutDiv.className = 'main-layout';
            const questionsColumn = document.createElement('div');
            questionsColumn.className = 'questions-column';
            section.questions.forEach(q => {
                const secDiv = document.createElement('div');
                secDiv.className = 'section';
                secDiv.id = 'sec_' + q.id;
                const titleSpan = document.createElement('span');
                titleSpan.className = 'question-title';
                titleSpan.innerText = `${questionCounter}. ${q.question}`;
                secDiv.appendChild(titleSpan);

                if (q.type === 'choice') {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'options';
                    optDiv.id = 'opts_' + q.id;
                    q.options.forEach(opt => {
                        const lbl = document.createElement('label');
                        lbl.innerHTML = `<input type="radio" name="${q.id}" value="${opt}" onclick="trackDuda('${q.id}'); saveProgress('${q.id}', '${opt}')"> ${opt}`;
                        optDiv.appendChild(lbl);
                    });
                    secDiv.appendChild(optDiv);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = q.id;
                    input.placeholder = q.type === 'reorder' ? 'Escribe el orden correcto aquí...' : 'Escribe la palabra o respuesta...';
                    input.oninput = function() { trackDuda(q.id); saveProgress(q.id, this.value); };
                    secDiv.appendChild(input);
                }
                questionsColumn.appendChild(secDiv);
                questionCounter++;
            });
            const visualCard = document.createElement('div');
            visualCard.className = 'visual-side-card';
            visualCard.innerHTML = `<span class="visual-emoji">${section.emoji}</span><span class="visual-tag">${section.tag}</span><p style="font-size:0.85em; color:#555; margin-top:10px;">Edward: Lee con atención la oración completa antes de responder. ¡Tú puedes!</p>`;
            layoutDiv.appendChild(questionsColumn);
            layoutDiv.appendChild(visualCard);
            container.appendChild(layoutDiv);
        });
        loadSavedProgress();
    }

    function saveProgress(id, val) {
        localStorage.setItem('comu_exam_2b_' + id, val);
        document.getElementById('sec_' + id).classList.remove('incomplete');
        if(document.querySelectorAll('.incomplete').length === 0) document.getElementById('missing-msg').style.display='none';
    }

    function loadSavedProgress() {
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                const saved = localStorage.getItem('comu_exam_2b_' + q.id);
                if (saved) {
                    if (q.type === 'choice') {
                        const radio = document.querySelector(`input[name="${q.id}"][value="${saved}"]`);
                        if (radio) radio.checked = true;
                    } else {
                        const txtInput = document.getElementById(q.id);
                        if (txtInput) txtInput.value = saved;
                    }
                }
            });
        });
    }

    function usarCincuentaCincuentaGlobal() {
        if (comodinUsado) return;
        let seleccionada = prompt("Edward, introduce el número de pregunta (de marcar) donde deseas descartar una alternativa incorrecta:");
        let qNum = parseInt(seleccionada);
        if (isNaN(qNum) || qNum < 1 || qNum > 40) return;
        let currentIdx = 1, targetId = null, targetQObj = null;
        for (let s of examData.sections) {
            for (let q of s.questions) {
                if (currentIdx === qNum) { targetId = q.id; targetQObj = q; break; }
                currentIdx++;
            }
            if (targetId) break;
        }
        if (!targetQObj || targetQObj.type !== 'choice') return;
        let labels = document.getElementById('opts_' + targetId).querySelectorAll('label');
        let incorrectasBorradas = 0;
        labels.forEach(lbl => {
            let radio = lbl.querySelector('input');
            if (radio.value !== targetQObj.correct && incorrectasBorradas < 1) { lbl.style.display = 'none'; incorrectasBorradas++; }
        });
        comodinUsado = true;
        document.getElementById('global-5050').disabled = true;
        document.getElementById('global-5050').innerText = "⚡ Súper Poder Usado";
    }

    function validarExamen() {
        let vacios = [];
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let r = q.type === 'choice' ? document.querySelector(`input[name="${q.id}"]:checked`) : document.getElementById(q.id).value.trim();
                if (!r) { const c = document.getElementById('sec_' + q.id); c.classList.add('incomplete'); vacios.push(c); }
            });
        });
        if (vacios.length > 0) { document.getElementById('missing-msg').style.display = 'block'; vacios[0].scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
        calificarExamen();
    }

    function calificarExamen() {
        let nota = 0, questionIndex = 1, itemsHTML = "";
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let uVal = q.type === 'choice' ? document.querySelector(`input[name="${q.id}"]:checked`).value : document.getElementById(q.id).value.trim();
                let cleanU = uVal.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                let cleanC = q.correct.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                let esOk = (cleanU === cleanC) || (q.type === 'write' && cleanU.includes(cleanC));
                if (esOk) nota++;
                itemsHTML += `<div class="item-revision" style="border-left:8px solid ${esOk?'#27ae60':'#e74c3c'}">
                    <p><strong>Pregunta ${questionIndex}: ${q.question}</strong></p>
                    <p>Tu respuesta: <span class="resp-usuario">${uVal}</span> ${esOk?'✅':'❌'}</p>
                    ${!esOk?`<p class="resp-correcta">Respuesta Correcta Esperada: ${q.correct}</p>`:''}
                    <p class="explicacion">📌 Explicación gramatical: ${q.feedback}</p>
                    <p class="tip-pizarra">💡 Whiteboard Tip (Consejo Rápido): ${q.tip || "Identifica primero el verbo principal para dividir la oración correctamente."}</p>
                    ${logDudas[q.id]>2?`<p style="color:#e67e22; font-weight:bold; font-size:0.9em; margin-top:5px;">⚠️ ¡Alerta de duda! Edward vaciló aquí. Practiquen este análisis en la pizarra.</p>`:''}
                </div>`;
                questionIndex++;
            });
        });
        const finalScore = Math.round((nota / 40) * 20);
        const rb = document.getElementById('result-box');
        rb.style.display = 'block';
        document.getElementById('score-text').innerText = `Puntaje Final Bimestral: ${finalScore} / 20 (${nota} aciertos de 40)`;
        document.getElementById('lista-items').innerHTML = itemsHTML;
        rb.className = finalScore >= 11 ? "correct-box" : "error-box";
        document.getElementById('feedback-content').innerHTML = finalScore >= 11 ? "<h4>🌟 ¡Excelente análisis sintáctico, Edward! Has superado con éxito tus prácticas anteriores.</h4>" : "<h4>📚 ¡Buen intento, Edward! Revisa los consejos rápidos de la pizarra inferior para dominar la estructura de la oración.</h4>";
        localStorage.clear();
        window.scrollTo({ top: rb.offsetTop, behavior: 'smooth' });
    }
    
    window.onload = renderQuiz;
</script>
</body>
</html>
