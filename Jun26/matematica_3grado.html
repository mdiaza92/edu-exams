<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Bimestral de Matemática - Edward</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #f4f6f9; padding: 15px; color: #2c3e50; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid #9b59b6; }
        h1 { text-align: center; color: #8e44ad; text-transform: uppercase; font-size: 1.8em; margin-bottom: 5px; }
        h2 { text-align: center; color: #7f8c8d; font-size: 1.1em; margin-bottom: 25px; }
        
        .section-header { 
            position: -webkit-sticky; position: sticky; top: 0; 
            background: #9b59b6; color: #fff; padding: 15px; 
            border-radius: 12px; margin: 30px 0 15px 0; 
            text-align: center; font-weight: bold; z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        /* DISEÑO INTEGRADO DE DOBLE COLUMNA */
        .main-layout { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 25px; }
        .questions-column { flex: 1; }
        
        /* TARJETA DE SOPORTE MULTIMEDIA E INFORMACIÓN */
        .visual-side-card { 
            width: 220px; background: #fbf5fc; border: 3px dashed #9b59b6; 
            border-radius: 18px; padding: 20px; text-align: center; 
            position: sticky; top: 70px; box-sizing: border-box;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .visual-emoji { font-size: 4.5em; margin-bottom: 10px; display: block; animation: floatAnim 3s ease-in-out infinite; }
        .visual-tag { background: #9b59b6; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; font-weight: bold; display: inline-block; }
        
        @keyframes floatAnim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .section { margin-bottom: 15px; padding: 18px; border: 2px solid #edf2f7; border-radius: 15px; background-color: #ffffff; transition: 0.3s; }
        .incomplete { border: 3px solid #e74c3c !important; background-color: #fff5f5 !important; }
        .question-title { font-weight: bold; margin-bottom: 12px; color: #2f3542; display: block; line-height: 1.4; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ced4da; font-size: 16px; font-family: inherit; box-sizing: border-box; }
        .options label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 8px; border: 1px solid #eee; transition: 0.2s; }
        .options label:hover { background: #fbf5fc; border-color: #9b59b6; }
        
        /* BOTÓN SUPER PODER 50/50 */
        .powerup-btn { background: #e67e22; color: white; border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8em; font-weight: bold; margin-top: 5px; }
        .powerup-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        button#btn-evaluar { display: block; width: 100%; max-width: 350px; height: 65px; margin: 40px auto; background: #27ae60; color: white; border: none; border-radius: 35px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #1e8449; }
        
        #result-box { display: none; padding: 25px; border-radius: 20px; margin-top: 30px; border: 4px solid; }
        .correct-box { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error-box { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        
        .revision-container { margin-top: 20px; background: white; border-radius: 10px; padding: 15px; border: 1px solid #ccc; }
        .item-revision { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ddd; text-align: left; }
        .resp-correcta { color: #27ae60; font-weight: bold; }
        .resp-usuario { font-style: italic; color: #555; }
        .explicacion { color: #2980b9; font-size: 0.9em; font-style: italic; margin-top: 5px; }
        .missing-alert { color: #e74c3c; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; padding: 10px; background: #fdf2f2; border-radius: 10px; border: 2px solid #e74c3c; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column-reverse; }
            .visual-side-card { width: 100%; position: relative; top: 0; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Gran Desafío de Matemática Bimestral</h1>
    <h2>Edward, ¡usa tu súper pizarra mental, piensa con calma y demuestra tu genialidad!</h2>

    <div style="text-align: center; margin-bottom: 15px;">
        <button class="powerup-btn" id="global-5050" onclick="usarCincuentaCincuentaGlobal()">⚡ Súper Poder: Comodín 50/50 (1 disponible)</button>
    </div>

    <div id="missing-msg" class="missing-alert">⚠️ ¡Edward, faltan resolver algunas preguntas del examen! Revisa los bloques marcados en rojo.</div>

    <form id="quizForm">
        <div id="quizContainer"></div>
        <button type="button" id="btn-evaluar" onclick="validarExamen()">✨ Terminar Examen</button>
    </form>

    <div id="result-box">
        <h3 id="score-text"></h3>
        <div id="feedback-content"></div>
        <div id="revision-lista" class="revision-container">
            <h4>🔍 Reporte de Pizarra Integral (Aprende de tus respuestas):</h4>
            <div id="lista-items"></div>
        </div>
    </div>
</div>

            {"id": "q2", "type": "choice", "question": "Aproxima el número 685 a la CENTENA más próxima en la recta numérica:", "options": ["600", "690", "700"], "correct": "700", "feedback": "El número 685 está más cerca del 700 que del 600 porque las decenas superan el punto medio 50."},

    let comodinUsado = false;

    // INYECTOR DINÁMICO DEL CÓDIGO DEL EXAMEN
    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        let questionCounter = 1;
        
        examData.sections.forEach(section => {
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = section.title;
            container.appendChild(header);
            
            const layoutDiv = document.createElement('div');
            layoutDiv.className = 'main-layout';
            
            const questionsColumn = document.createElement('div');
            questionsColumn.className = 'questions-column';
            
            section.questions.forEach(q => {
                const secDiv = document.createElement('div');
                secDiv.className = 'section';
                secDiv.id = 'sec_' + q.id;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'question-title';
                titleSpan.innerText = `${questionCounter}. ${q.question}`;
                secDiv.appendChild(titleSpan);
                
                if (q.type === 'choice') {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'options';
                    optDiv.id = 'opts_' + q.id;
                    q.options.forEach(opt => {
                        const lbl = document.createElement('label');
                        lbl.innerHTML = `<input type="radio" name="${q.id}" value="${opt}" onclick="saveProgress('${q.id}', '${opt}')"> ${opt}`;
                        optDiv.appendChild(lbl);
                    });
                    secDiv.appendChild(optDiv);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = q.id;
                    input.placeholder = q.type === 'reorder' ? 'Escribe la oración ordenada aquí...' : 'Escribe el número, letra o palabras...';
                    input.oninput = function() { saveProgress(q.id, this.value); };
                    secDiv.appendChild(input);
                }
                
                questionsColumn.appendChild(secDiv);
                questionCounter++;
            });
            
            const visualCard = document.createElement('div');
            visualCard.className = 'visual-side-card';
            visualCard.innerHTML = `
                <span class="visual-emoji">${section.emoji}</span>
                <span class="visual-tag">${section.tag}</span>
                <p style="font-size: 0.85em; color: #555; margin-top: 10px; line-height: 1.3;">
                    Edward: Utiliza tu hoja borrador o pizarra para hacer tus cálculos antes de responder. ¡Tú puedes!
                </p>
            `;
            
            layoutDiv.appendChild(questionsColumn);
            layoutDiv.appendChild(visualCard);
            container.appendChild(layoutDiv);
        });

        loadSavedProgress();
    }

    // MEJORA TECNOLÓGICA: GUARDADO AUTOMÁTICO EN LA TABLET (localStorage)
    function saveProgress(id, val) {
        localStorage.setItem('math_exam_edward_' + id, val);
        document.getElementById('sec_' + id).classList.remove('incomplete');
        if(document.querySelectorAll('.incomplete').length === 0) document.getElementById('missing-msg').style.display='none';
    }

    function loadSavedProgress() {
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                const saved = localStorage.getItem('math_exam_edward_' + q.id);
                if (saved) {
                    if (q.type === 'choice') {
                        const radio = document.querySelector(`input[name="${q.id}"][value="${saved}"]`);
                        if (radio) radio.checked = true;
                    } else {
                        const txtInput = document.getElementById(q.id);
                        if (txtInput) txtInput.value = saved;
                    }
                }
            });
        });
    }

    // MEJORA TECNOLÓGICA: COMODÍN GAMIFICACIÓN 50/50
    function usarCincuentaCincuentaGlobal() {
        if (comodinUsado) return;
        
        let seleccionada = prompt("Edward, escribe el número de pregunta (de opción múltiple) donde deseas usar el comodín del 50/50:");
        let qNum = parseInt(seleccionada);
        
        if (isNaN(qNum) || qNum < 1 || qNum > 40) {
            alert("Número de pregunta no válido.");
            return;
        }

        // Buscar el ID de la pregunta correspondiente basándonos en el conteo
        let currentIdx = 1;
        let targetId = null;
        let targetQObj = null;

        for (let s of examData.sections) {
            for (let q of s.questions) {
                if (currentIdx === qNum) {
                    targetId = q.id;
                    targetQObj = q;
                    break;
                }
                currentIdx++;
            }
            if (targetId) break;
        }

        if (targetQObj.type !== 'choice') {
            alert("El comodín solo se puede usar en preguntas de marcar (opción múltiple).");
            return;
        }

        // Eliminar opciones falsas (dejar la correcta y una falsa aleatoria)
        let optsDiv = document.getElementById('opts_' + targetId);
        let labels = optsDiv.querySelectorAll('label');
        let incorrectasBorradas = 0;

        labels.forEach(lbl => {
            let radio = lbl.querySelector('input');
            if (radio.value !== targetQObj.correct && incorrectasBorradas < 1) {
                lbl.style.display = 'none'; // Esconde la opción incorrecta
                incorrectasBorradas++;
            }
        });

        comodinUsado = true;
        document.getElementById('global-5050').disabled = true;
        document.getElementById('global-5050').innerText = "⚡ Súper Poder: Comodín Usado";
        alert(`¡Poder activado! En la pregunta ${qNum} se ha eliminado una opción incorrecta para ayudarte.`);
    }

    // VALIDACIÓN ESTRICTA ANTI-RESPUESTAS VACÍAS
    function validarExamen() {
        let vacios = [];
        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let respondido = false;
                if (q.type === 'choice') {
                    if (document.querySelector(`input[name="${q.id}"]:checked`)) respondido = true;
                } else {
                    if (document.getElementById(q.id).value.trim() !== "") respondido = true;
                }
                
                if (!respondido) {
                    const container = document.getElementById('sec_' + q.id);
                    container.classList.add('incomplete');
                    vacios.push(container);
                }
            });
        });

        if (vacios.length > 0) {
            document.getElementById('missing-msg').style.display = 'block';
            vacios[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        calificarExamen();
    }

    // CALIFICADOR AUTOMÁTICO CON RETROALIMENTACIÓN INTEGRAL 360°
    function calificarExamen() {
        let nota = 0;
        let totalPreguntas = 40;
        let itemsHTML = "";
        let questionIndex = 1;

        examData.sections.forEach(section => {
            section.questions.forEach(q => {
                let uVal = "";
                if (q.type === 'choice') {
                    uVal = document.querySelector(`input[name="${q.id}"]:checked`).value;
                } else {
                    uVal = document.getElementById(q.id).value.trim();
                }

                // Normalización de cadenas para validaciones flexibles e inteligentes
                let cleanU = uVal.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                let cleanC = q.correct.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.?!,']/g, "").replace(/\s+/g, ' ').trim();
                
                let esOk = (cleanU === cleanC) || (q.type === 'write' && cleanU.includes(cleanC));
                if (esOk) nota++;

                itemsHTML += `<div class="item-revision" style="border-left: 8px solid ${esOk ? '#27ae60' : '#e74c3c'}">
                    <p><strong>Pregunta ${questionIndex}: ${q.question}</strong></p>
                    <p>Tu respuesta en la tablet: <span class="resp-usuario">${uVal}</span> ${esOk ? '✅' : '❌'}</p>
                    ${!esOk ? `<p class="resp-correcta">Respuesta Correcta Esperada: ${q.correct}</p>` : ''}
                    <p class="explicacion">💡 Pizarra de corrección: ${q.feedback}</p>
                </div>`;
                    
                questionIndex++;
            });
        });

        // Escala del sistema de evaluación tradicional peruano (0 a 20)
        const finalScore = Math.round((nota / totalPreguntas) * 20);
        const rb = document.getElementById('result-box');
        
        rb.style.display = 'block';
        document.getElementById('score-text').innerText = `Puntaje Obtenido: ${finalScore} / 20 (${nota} aciertos de 40)`;
        document.getElementById('lista-items').innerHTML = itemsHTML;
        
        if(finalScore >= 11) {
            rb.className = "correct-box";
            document.getElementById('feedback-content').innerHTML = "<h4>🌟 ¡Excelente esfuerzo, Edward! Has superado el reto bimestral de Matemática de forma espectacular.</h4>";
        } else {
            rb.className = "error-box";
            document.getElementById('feedback-content').innerHTML = "<h4>📚 ¡Buen intento, Edward! Revisa las explicaciones de la pizarra inferior para seguir mejorando.</h4>";
        }
        
        // Al terminar, limpiar el almacenamiento local para que pueda volver a practicar limpio
        localStorage.clear();
        window.scrollTo({ top: rb.offsetTop, behavior: 'smooth' });
    }

    window.onload = renderQuiz;
</script>
